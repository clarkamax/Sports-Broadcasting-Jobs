<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Broadcasting - BoonetTV</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #050708 0%, #0a0e11 50%, #0d1015 100%);
      color: #e6edf3;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ==================== SPLASH SCREEN ==================== */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: netflixTransition 2.5s ease-in 3s forwards;
    }

    #splash-screen.hidden { display: none; }

    .splash-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .splash-logo {
      width: 200px;
      height: 200px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    }

    .logo-svg { animation: netflixScale 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0s forwards; }

    @keyframes netflixScale {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes netflixTransition {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      75% {
        opacity: 1;
        transform: scale(1);
      }
      95% {
        opacity: 0.1;
        transform: scale(1.02);
      }
      100% {
        opacity: 0;
        transform: scale(1.05);
        pointer-events: none;
        visibility: hidden;
      }
    }

    .splash-text {
      text-align: center;
      opacity: 0;
      animation: fadeInText 1s ease-out 1.5s forwards;
    }

    .splash-text h1 {
      font-size: 48px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .splash-text p {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
    }

    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes splashFadeOut {
      0% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; pointer-events: none; visibility: hidden; }
    }

    /* ==================== MAIN LAYOUT ==================== */
    header {
      background: rgba(10, 14, 17, 0.4) linear-gradient(180deg, rgba(185, 28, 28, 0.1) 0%, transparent 100%);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(185, 28, 28, 0.2);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    header .logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(185, 28, 28, 0.3);
      transition: all 0.3s ease;
    }

    header .logo:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(185, 28, 28, 0.4);
    }

    header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #fff;
    }

    header span {
      font-size: 13px;
      color: rgba(185, 28, 28, 0.8);
      margin-left: 4px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 32px;
      background: transparent;
      flex-wrap: wrap;
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .toolbar input, .toolbar select {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toolbar input::placeholder { color: rgba(139, 148, 158, 0.6); }

    .toolbar input:focus, .toolbar select:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(185, 28, 28, 0.6);
      box-shadow: 0 0 20px rgba(185, 28, 28, 0.2);
    }

    .toolbar input[name="job"] { width: 200px; }
    .toolbar input[name="date"] { width: 150px; }
    .toolbar input[name="duedate"] { width: 150px; }
    .toolbar input[name="location"] { width: 160px; }

    .assignee-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 6px 10px;
      border-radius: 8px;
      flex: 1;
      transition: all 0.3s ease;
    }

    .assignee-pills:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(185, 28, 28, 0.3);
    }

    .assignee-pill {
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
      color: #fff;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(185, 28, 28, 0.2);
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .assignee-pill .remove {
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }

    .assignee-pill .remove:hover { transform: scale(1.3); }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 0.4px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
      color: #fff;
      box-shadow: 0 8px 16px rgba(185, 28, 28, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(185, 28, 28, 0.35);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #e6edf3;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(185, 28, 28, 0.4);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: transparent;
      color: #f85149;
      border: 1px solid rgba(248, 81, 73, 0.3);
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-danger:hover {
      border-color: #f85149;
      background: rgba(248, 81, 73, 0.1);
    }

    .manage-staff-btn { margin-left: auto; }

    .main {
      padding: 32px;
      max-width: 1600px;
      margin: 0 auto;
      animation: fadeIn 0.8s ease-out 0.3s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(185, 28, 28, 0.2);
      border-radius: 16px;
      padding: 24px;
      min-width: 140px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      animation: slideInUp 0.6s ease-out forwards;
      opacity: 0;
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.15s; }
    .stat-card:nth-child(3) { animation-delay: 0.2s; }
    .stat-card:nth-child(4) { animation-delay: 0.25s; }
    .stat-card:nth-child(5) { animation-delay: 0.3s; }

    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .stat-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(185, 28, 28, 0.4);
      box-shadow: 0 16px 48px rgba(185, 28, 28, 0.15);
    }

    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(139, 148, 158, 0.8);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 36px;
      font-weight: 800;
      color: #e6edf3;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
      animation: slideInUp 0.6s ease-out 0.1s forwards;
      opacity: 0;
    }

    .filters label { font-size: 12px; color: rgba(139, 148, 158, 0.8); font-weight: 600; }

    .filters select, .filters input {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e6edf3;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: all 0.3s ease;
    }

    .filters select:focus, .filters input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(185, 28, 28, 0.6);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(10, 14, 17, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 13px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
      animation: slideInUp 0.6s ease-out 0.2s forwards;
      opacity: 0;
    }

    thead tr {
      background: rgba(185, 28, 28, 0.08);
      border-bottom: 2px solid rgba(185, 28, 28, 0.2);
    }

    th {
      padding: 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(185, 28, 28, 0.8);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.3s ease;
    }

    th:hover { color: rgba(185, 28, 28, 1); }
    th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 10px; }

    tbody tr {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: scale(1.01);
    }

    td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    td input, td select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid transparent;
      color: #e6edf3;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 4px;
      width: 100%;
      outline: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    td input:hover, td select:hover { border-color: rgba(255, 255, 255, 0.1); }
    td input:focus, td select:focus { border-color: rgba(185, 28, 28, 0.6); background: rgba(185, 28, 28, 0.1); cursor: text; }

    td select option { background: #0a0e11; }

    .assignee-badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(185, 28, 28, 0.9) 0%, rgba(220, 38, 38, 0.9) 100%);
      color: #fff;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      margin-right: 6px;
      margin-bottom: 2px;
      box-shadow: 0 4px 12px rgba(185, 28, 28, 0.2);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(139, 148, 158, 0.6);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .empty-state p { font-size: 14px; }

    /* ==================== MODALS ==================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease-out;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: rgba(10, 14, 17, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 28px;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: popModal 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popModal {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal h2 { font-size: 18px; margin-bottom: 20px; color: #e6edf3; font-weight: 700; }

    .staff-list { list-style: none; margin-bottom: 20px; }
    .staff-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .staff-list li:hover { padding-left: 4px; }
    .staff-list li:last-child { border-bottom: none; }

    .add-staff-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-staff-row input {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e6edf3;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: all 0.3s ease;
    }

    .add-staff-row input:focus { border-color: rgba(185, 28, 28, 0.6); background: rgba(185, 28, 28, 0.1); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .assignee-checkboxes {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .assignee-checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .assignee-checkbox-item:hover { background: rgba(255, 255, 255, 0.06); }
    .assignee-checkbox-item input { cursor: pointer; }

    .overdue td { background: rgba(248, 81, 73, 0.08); }
    .overdue td:first-child { border-left: 3px solid #f85149; }
    .due-soon td { background: rgba(185, 28, 28, 0.08); }
    .due-soon td:first-child { border-left: 3px solid #b91c1c; }
    .due-date-overdue { color: #f85149; font-weight: 600; }
    .due-date-soon { color: #b91c1c; font-weight: 600; }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
  <div class="splash-container">
    <svg class="logo-svg" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
      <!-- White circle background -->
      <circle cx="110" cy="150" r="125" fill="white" />

      <!-- Black circle border - thick -->
      <circle cx="110" cy="150" r="125" fill="none" stroke="#000000" stroke-width="8" />

      <!-- Red background for B -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z"
        fill="#b91c1c" />

      <!-- White outer strokes for beveled 3D effect -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z"
        fill="none" stroke="white" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" />

      <!-- Red outline strokes for beveled effect -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z"
        fill="none" stroke="#b91c1c" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />

      <!-- TV Text - Bold black, positioned to the right -->
      <text x="185" y="185" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#000000" letter-spacing="0" class="logo-tv-text">TV</text>
    </svg>
  </div>
</div>

<header>
  <div class="logo">
    <svg width="50" height="50" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
      <!-- White circle background -->
      <circle cx="110" cy="150" r="125" fill="white" />
      <!-- Black circle border -->
      <circle cx="110" cy="150" r="125" fill="none" stroke="#000000" stroke-width="8" />
      <!-- Red background for B -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z" fill="#b91c1c" />
      <!-- White outer strokes -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z" fill="none" stroke="white" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" />
      <!-- Red outline strokes -->
      <path d="M 50 60 L 50 240 L 130 240 Q 155 240 155 215 L 155 195 Q 155 180 135 175 L 155 175 Q 175 170 175 150 L 175 85 Q 175 60 155 60 Z M 75 90 L 130 90 Q 150 90 150 105 L 150 165 L 75 165 Z M 75 190 L 150 190 Q 165 190 165 205 L 165 220 Q 165 235 130 235 L 75 235 Z" fill="none" stroke="#b91c1c" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" />
      <!-- TV Text -->
      <text x="185" y="185" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="#000000" letter-spacing="0">TV</text>
    </svg>
  </div>
  <h1>Sports Broadcasting</h1>
</header>

<div class="toolbar">
  <span style="font-size:12px;color:rgba(139, 148, 158, 0.8);font-weight:600;">Event:</span>
  <input name="date" type="date" id="inp-date" title="Broadcast / Event Date" />
  <span style="font-size:12px;color:rgba(139, 148, 158, 0.8);font-weight:600;">Due:</span>
  <input name="duedate" type="date" id="inp-duedate" title="Due Date" />
  <input name="job" type="text" placeholder="Job title..." id="inp-job" />
  <input name="location" type="text" placeholder="Location / Venue..." id="inp-location" />
  <div id="assignee-pills-container" class="assignee-pills">
    <span style="font-size:12px;color:rgba(139, 148, 158, 0.7);">No one selected</span>
  </div>
  <button class="btn btn-secondary" onclick="openAssigneeModal()" style="margin: 0;">Manage Assignees</button>
  <select name="status" id="inp-status">
    <option value="todo">To Do</option>
    <option value="progress">In Progress</option>
    <option value="done">Done</option>
    <option value="cancelled">Cancelled</option>
  </select>
  <select name="priority" id="inp-priority">
    <option value="medium">Medium</option>
    <option value="high">High</option>
    <option value="low">Low</option>
  </select>
  <button class="btn btn-primary" onclick="addJob()">+ Add Job</button>
  <button class="btn btn-secondary manage-staff-btn" onclick="openStaffModal()">Manage Staff</button>
</div>

<div class="main">
  <div id="error-container"></div>
  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Jobs</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">In Progress</div>
      <div class="value" id="stat-progress">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Completed</div>
      <div class="value" id="stat-done">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Unassigned</div>
      <div class="value" id="stat-unassigned">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Overdue</div>
      <div class="value" id="stat-overdue">0</div>
    </div>
  </div>

  <div class="filters">
    <label>Filter:</label>
    <input type="text" placeholder="Search jobs..." id="filter-search" oninput="renderTable()" />
    <select id="filter-status" onchange="renderTable()">
      <option value="">All Statuses</option>
      <option value="todo">To Do</option>
      <option value="progress">In Progress</option>
      <option value="done">Done</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <select id="filter-assignee" onchange="renderTable()">
      <option value="">All Staff</option>
    </select>
    <select id="filter-priority" onchange="renderTable()">
      <option value="">All Priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="hide-completed" onchange="renderTable()" />
      <span style="font-size:12px;color:rgba(139, 148, 158, 0.8);">Hide Completed</span>
    </label>
  </div>

  <table>
    <thead>
      <tr>
        <th class="row-num">#</th>
        <th onclick="sortBy('job')">Job Title <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('date')">Event Date <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('dueDate')">Due Date <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('location')">Location <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('assignee')">Assigned To <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('status')">Status <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('priority')">Priority <span class="sort-icon">↕</span></th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="job-table-body"></tbody>
  </table>
</div>

<!-- Staff Modal -->
<div class="modal-overlay" id="staff-modal">
  <div class="modal">
    <h2>Manage Staff</h2>
    <div class="add-staff-row">
      <input type="text" id="new-staff-input" placeholder="Staff member name..." onkeydown="if(event.key==='Enter')addStaff()" />
      <button class="btn btn-primary" onclick="addStaff()">Add</button>
    </div>
    <ul class="staff-list" id="staff-list"></ul>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeStaffModal()">Close</button>
    </div>
  </div>
</div>

<!-- Assignee Modal -->
<div class="modal-overlay" id="assignee-modal">
  <div class="modal" style="margin-top: 16px;">
    <h2>Select Assignees for Job</h2>
    <div class="assignee-checkboxes" id="assignee-checkboxes"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAssigneeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAssignees()">Confirm</button>
    </div>
  </div>
</div>

<script>
  // Splash Screen - Netflix style
  window.addEventListener('load', () => {
    const splash = document.getElementById('splash-screen');
    // Splash plays for 1.5s scale + 1.5s pause + 2.5s transition = ~5.5s total
    setTimeout(() => {
      splash.style.display = 'none';
    }, 5500);
  });

  let jobs = [];
  let staff = [];
  let selectedAssignees = [];
  let sortCol = 'date';
  let sortDir = 1;
  let firebaseReady = false;
  let editingJobId = null;

  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyAVptctnUojdVbnr_w_EKUQi4I0_EWCb1A",
    authDomain: "sports-broadcasting-33b15.firebaseapp.com",
    projectId: "sports-broadcasting-33b15",
    databaseURL: "https://sports-broadcasting-33b15-default-rtdb.firebaseio.com",
    storageBucket: "sports-broadcasting-33b15.firebasestorage.app",
    messagingSenderId: "876970641794",
    appId: "1:876970641794:web:27bab37eed4774ea32279b"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Load jobs in real-time
  db.ref('jobs').on('value', (snapshot) => {
    jobs = [];
    snapshot.forEach((child) => {
      jobs.push({ id: child.key, ...child.val() });
    });
    renderTable();
    firebaseReady = true;
  }, (error) => {
    showError('Firebase error: ' + error.message);
  });

  // Load staff in real-time
  db.ref('staff').on('value', (snapshot) => {
    staff = [];
    snapshot.forEach((child) => {
      staff.push(child.val());
    });
    populateStaffDropdowns();
    renderTable();
  });

  function showError(msg) {
    const container = document.getElementById('error-container');
    container.innerHTML = `<div class="error-msg">⚠️ ${esc(msg)}</div>`;
    setTimeout(() => container.innerHTML = '', 5000);
  }

  function addJob() {
    if (!firebaseReady) {
      showError('Still loading...');
      return;
    }
    const job = document.getElementById('inp-job').value.trim();
    if (!job) { document.getElementById('inp-job').focus(); return; }

    const newJob = {
      job,
      date: document.getElementById('inp-date').value,
      dueDate: document.getElementById('inp-duedate').value,
      location: document.getElementById('inp-location').value.trim(),
      assignees: selectedAssignees.slice(),
      status: document.getElementById('inp-status').value,
      priority: document.getElementById('inp-priority').value,
      notes: ''
    };

    db.ref('jobs').push(newJob, (error) => {
      if (error) {
        showError('Failed to add job: ' + error.message);
      } else {
        document.getElementById('inp-job').value = '';
        document.getElementById('inp-location').value = '';
        selectedAssignees = [];
        updateAssigneeDisplay();
      }
    });
  }

  function deleteJob(id) {
    db.ref('jobs/' + id).remove((error) => {
      if (error) showError('Failed to delete: ' + error.message);
    });
  }

  function updateJob(id, field, value) {
    db.ref('jobs/' + id + '/' + field).set(value, (error) => {
      if (error) showError('Update failed: ' + error.message);
    });
  }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderTable();
  }

  function getFiltered() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const fStatus = document.getElementById('filter-status').value;
    const fAssignee = document.getElementById('filter-assignee').value;
    const fPriority = document.getElementById('filter-priority').value;
    const hideCompleted = document.getElementById('hide-completed').checked;
    return jobs.filter(j => {
      const assigneeStr = (j.assignees || []).join(' ').toLowerCase();
      if (search && !j.job.toLowerCase().includes(search) && !j.location.toLowerCase().includes(search) && !assigneeStr.includes(search)) return false;
      if (fStatus && j.status !== fStatus) return false;
      if (fAssignee && !j.assignees?.includes(fAssignee)) return false;
      if (fPriority && j.priority !== fPriority) return false;
      if (hideCompleted && (j.status === 'done' || j.status === 'cancelled')) return false;
      return true;
    }).sort((a, b) => {
      let av = a[sortCol] || '', bv = b[sortCol] || '';
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }

  const statusLabels = { todo: 'To Do', progress: 'In Progress', done: 'Done', cancelled: 'Cancelled' };
  const priorityLabels = { high: 'High', medium: 'Medium', low: 'Low' };

  function renderTable() {
    const tbody = document.getElementById('job-table-body');
    const data = getFiltered();
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div class="icon">📋</div><p>No jobs found. Add one above!</p></div></td></tr>`;
      updateStats();
      return;
    }
    const today = new Date(); today.setHours(0,0,0,0);
    tbody.innerHTML = data.map((j, i) => {
      const dueDateObj = j.dueDate ? new Date(j.dueDate + 'T00:00:00') : null;
      const isOverdue = dueDateObj && dueDateObj < today && j.status !== 'done' && j.status !== 'cancelled';
      const isSoon = dueDateObj && !isOverdue && (dueDateObj - today) <= 2 * 86400000 && j.status !== 'done' && j.status !== 'cancelled';
      const rowClass = isOverdue ? 'overdue' : isSoon ? 'due-soon' : '';
      const dueCellClass = isOverdue ? 'due-date-overdue' : isSoon ? 'due-date-soon' : '';
      return `
      <tr class="${rowClass}">
        <td class="row-num">${i + 1}</td>
        <td><input value="${esc(j.job)}" onchange="updateJob('${j.id}','job',this.value)" /></td>
        <td><input type="date" value="${esc(j.date||'')}" onchange="updateJob('${j.id}','date',this.value)" /></td>
        <td class="${dueCellClass}"><input type="date" value="${esc(j.dueDate||'')}" onchange="updateJob('${j.id}','dueDate',this.value);renderTable()" style="${isOverdue?'color:#f85149;font-weight:600':isSoon?'color:#b91c1c;font-weight:600':''}" /></td>
        <td><input value="${esc(j.location||'')}" placeholder="—" onchange="updateJob('${j.id}','location',this.value)" /></td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
            ${(j.assignees || []).length === 0
              ? '<span style="color:#8b949e;">—</span>'
              : (j.assignees || []).map(a => `<span class="assignee-badge">${esc(a)}</span>`).join('')
            }
            <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px;" onclick="editJobAssignees('${j.id}')">Edit</button>
          </div>
        </td>
        <td>
          <select onchange="updateJob('${j.id}','status',this.value);renderTable()">
            ${['todo','progress','done','cancelled'].map(s => `<option value="${s}" ${j.status===s?'selected':''}>${statusLabels[s]}</option>`).join('')}
          </select>
        </td>
        <td>
          <select onchange="updateJob('${j.id}','priority',this.value);renderTable()">
            ${['high','medium','low'].map(p => `<option value="${p}" ${j.priority===p?'selected':''}>${priorityLabels[p]}</option>`).join('')}
          </select>
        </td>
        <td><input value="${esc(j.notes||'')}" placeholder="Add notes..." onchange="updateJob('${j.id}','notes',this.value)" /></td>
        <td class="actions">
          <button class="btn btn-danger" onclick="deleteJob('${j.id}')">✕ Remove</button>
        </td>
      </tr>
    `;}).join('');
    updateStats();
  }

  function updateStats() {
    const now = new Date(); now.setHours(0,0,0,0);
    document.getElementById('stat-total').textContent = jobs.length;
    document.getElementById('stat-progress').textContent = jobs.filter(j => j.status === 'progress').length;
    document.getElementById('stat-done').textContent = jobs.filter(j => j.status === 'done').length;
    document.getElementById('stat-unassigned').textContent = jobs.filter(j => !j.assignees || j.assignees.length === 0).length;
    document.getElementById('stat-overdue').textContent = jobs.filter(j => j.dueDate && new Date(j.dueDate + 'T00:00:00') < now && j.status !== 'done' && j.status !== 'cancelled').length;
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function populateStaffDropdowns() {
    const filterSel = document.getElementById('filter-assignee');
    const val = filterSel.value;
    filterSel.innerHTML = '<option value="">All Staff</option>';
    staff.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      filterSel.appendChild(opt);
    });
    filterSel.value = val;
  }

  function openStaffModal() {
    renderStaffList();
    document.getElementById('staff-modal').classList.add('open');
  }

  function closeStaffModal() {
    document.getElementById('staff-modal').classList.remove('open');
  }

  function renderStaffList() {
    const ul = document.getElementById('staff-list');
    ul.innerHTML = staff.length
      ? staff.map((s) => `<li><span>${esc(s)}</span><button class="btn btn-danger" onclick="removeStaff('${esc(s)}')">Remove</button></li>`).join('')
      : '<li style="color:#8b949e">No staff added yet.</li>';
  }

  function addStaff() {
    const input = document.getElementById('new-staff-input');
    const name = input.value.trim();
    if (!name || staff.includes(name)) return;

    const newKey = db.ref('staff').push().key;
    db.ref('staff/' + newKey).set(name, (error) => {
      if (error) {
        showError('Failed to add staff: ' + error.message);
      } else {
        input.value = '';
      }
    });
  }

  function removeStaff(name) {
    db.ref('staff').orderByValue().equalTo(name).once('value', (snapshot) => {
      snapshot.forEach((child) => {
        db.ref('staff/' + child.key).remove();
      });
    });
  }

  function openAssigneeModal() {
    const container = document.getElementById('assignee-checkboxes');
    container.innerHTML = staff.map(s => `
      <label class="assignee-checkbox-item">
        <input type="checkbox" value="${esc(s)}" ${selectedAssignees.includes(s) ? 'checked' : ''} />
        ${esc(s)}
      </label>
    `).join('');
    document.getElementById('assignee-modal').classList.add('open');
  }

  function closeAssigneeModal() {
    document.getElementById('assignee-modal').classList.remove('open');
  }

  function confirmAssignees() {
    const checked = document.querySelectorAll('#assignee-checkboxes input:checked');
    const newAssignees = Array.from(checked).map(cb => cb.value);

    if (editingJobId) {
      updateJob(editingJobId, 'assignees', newAssignees);
      editingJobId = null;
    } else {
      selectedAssignees = newAssignees;
      updateAssigneeDisplay();
    }
    closeAssigneeModal();
  }

  function updateAssigneeDisplay() {
    const container = document.getElementById('assignee-pills-container');
    if (selectedAssignees.length === 0) {
      container.innerHTML = '<span style="font-size:12px;color:rgba(139, 148, 158, 0.7);">No one selected</span>';
    } else {
      container.innerHTML = selectedAssignees.map(name => `
        <div class="assignee-pill">
          ${esc(name)}
          <span class="remove" onclick="removeAssignee('${esc(name)}')">×</span>
        </div>
      `).join('');
    }
  }

  function removeAssignee(name) {
    selectedAssignees = selectedAssignees.filter(a => a !== name);
    updateAssigneeDisplay();
  }

  function editJobAssignees(jobId) {
    editingJobId = jobId;
    const job = jobs.find(j => j.id === jobId);
    selectedAssignees = (job.assignees || []).slice();
    openAssigneeModal();
  }

  document.getElementById('staff-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeStaffModal();
  });

  document.getElementById('assignee-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeAssigneeModal();
  });

  // Set today as default date
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
